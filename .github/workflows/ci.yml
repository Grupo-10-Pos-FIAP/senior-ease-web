name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Pipeline: lint → test → build (habilitar na fase de implementação)
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
